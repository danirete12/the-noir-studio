<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Noir Studio — Editor de Fotografía Gratis</title>
  <meta name="description" content="Editor de fotografía online con presets cinematográficos inspirados en el cine y la pintura. Gratis, sin registro. Exporta a Instagram 1080×1350.">
  <meta property="og:title" content="The Noir Studio — Editor de Fotografía Gratis">
  <meta property="og:description" content="Presets de fotografía con estética editorial. Gratis, sin instalar nada, sin cuenta.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://raw.githubusercontent.com/danirete12/the-noir-studio/master/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="The Noir Studio — Editor de Fotografía Gratis">
  <meta name="twitter:image" content="https://raw.githubusercontent.com/danirete12/the-noir-studio/master/og-image.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:         #ffffff;
      --panel:      #f8f8f6;
      --border:     #e0ddd8;
      --text:       #1a1a1a;
      --muted:      #aaa;
      --canvas-bg:  #141414;
      --accent:     #C8201A;
      --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-sans:  'Inter', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.08em;
      height: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      align-items: baseline;
      gap: desktop16px;
      flex-shrink: 0;
    }

    header h1 {
      font-family: var(--font-serif);
      font-size: 1.25rem;
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--text);
    }

    header .tagline {
      font-size: 0.55rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .header-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    /* Candado */
    #btn-lock {
      background: none;
      border: 1px solid var(--border);
      padding: 5px 7px;
      cursor: pointer;
      color: var(--muted);
      display: flex;
      align-items: center;
      transition: color 0.2s, border-color 0.2s;
    }
    #btn-lock:hover { color: var(--text); border-color: #aaa; }
    #btn-lock.locked { color: var(--accent); border-color: var(--accent); }
    #btn-lock svg { width: 13px; height: 13px; display: block; }

    /* ── Tab bar de grupos ── */
    .presets-bar-wrapper {
      flex-shrink: 0;
      background: var(--bg);
    }

    .tab-bar {
      display: flex;
      align-items: center;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      -webkit-mask-image: linear-gradient(to right, black 0%, black calc(100% - 40px), transparent 100%);
      mask-image: linear-gradient(to right, black 0%, black calc(100% - 40px), transparent 100%);
    }
    .tab-bar.scrolled-end {
      -webkit-mask-image: none;
      mask-image: none;
    }
    .tab-bar::-webkit-scrollbar { display: none; }

    .tab-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: var(--font-sans);
      font-size: 0.6rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
      background: none;
      border: none;
      border-bottom: 1.5px solid transparent;
      padding: 11px 16px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      flex-shrink: 0;
      margin-bottom: -1px;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-icon {
      width: 14px; height: 14px;
      flex-shrink: 0;
      opacity: 0.7;
    }
    .tab-icon svg { width: 100%; height: 100%; display: block; }
    .tab-btn.active .tab-icon { opacity: 1; }

    .tab-separator {
      width: 1px;
      height: 12px;
      background: var(--border);
      flex-shrink: 0;
      margin: 0 4px;
    }

    /* ── Drawer desplegable ── */
    .tab-drawer {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.28s cubic-bezier(0.4,0,0.2,1);
      background: var(--bg);
    }
    .tab-drawer.open {
      max-height: 160px;
      border-bottom: 1px solid var(--border);
    }
    .tab-drawer.open-tall {
      max-height: 260px;
      border-bottom: 1px solid var(--border);
    }

    .drawer-presets {
      display: none;
      align-items: stretch;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 0 16px;
      -webkit-mask-image: linear-gradient(to right, black 0%, black calc(100% - 52px), transparent 100%);
      mask-image: linear-gradient(to right, black 0%, black calc(100% - 52px), transparent 100%);
    }
    .drawer-presets.visible { display: flex; }
    .drawer-presets.scrolled-end {
      -webkit-mask-image: none;
      mask-image: none;
    }
    .drawer-presets::-webkit-scrollbar { display: none; }

    .btn-preset {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      min-width: 72px;
      background: none;
      border: none;
      border-bottom: 1.5px solid transparent;
      padding: 11px 7px 10px;
      cursor: pointer;
      transition: color 0.22s, border-color 0.22s;
      flex-shrink: 0;
    }
    .btn-preset:hover .preset-icon { color: #666; }
    .btn-preset:hover .preset-label { color: #666; }

    .preset-icon {
      width: 20px; height: 20px;
      color: #bbb;
      flex-shrink: 0;
      transition: color 0.22s;
    }
    .preset-icon svg { width: 100%; height: 100%; display: block; }

    .preset-label {
      font-family: var(--font-serif);
      font-size: 0.62rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
      transition: color 0.22s;
      line-height: 1.3;
      text-align: center;
    }

    /* Drawer Geometría */
    .drawer-geo {
      display: none;
      padding: 12px 20px 14px;
      gap: 12px;
      flex-direction: column;
    }
    .drawer-geo.visible { display: flex; }
    .drawer-geo .control { margin-bottom: 0; }
    .drawer-geo .annotation-row { margin-top: 0; padding-top: 0; border-top: none; }

    /* Drawer Recorte */
    .drawer-crop {
      display: none;
      padding: 10px 16px 12px;
    }
    .drawer-crop.visible { display: block; }
    .drawer-crop .crop-formats {
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
      gap: 6px;
    }
    .drawer-crop .crop-formats::-webkit-scrollbar { display: none; }
    .drawer-crop .btn-crop { flex: 0 0 auto; min-width: 52px; }
    .drawer-crop .crop-custom-inputs { margin-top: 8px; }

    /* ── Layout principal ── */
    .workspace {
      flex: 1;
      height: 0;
      display: grid;
      grid-template-columns: 1fr 256px;
      overflow: hidden;
    }

    /* ── Canvas area – negativo ── */
    .canvas-area {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      background: var(--canvas-bg);
      overflow: hidden;
      position: relative;
    }

    .drop-zone {
      border: 1px solid #3a3a3a;
      width: 100%;
      max-width: 420px;
      aspect-ratio: 4/5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      cursor: pointer;
      transition: border-color 0.3s;
    }
    .drop-zone:hover, .drop-zone.drag-over { border-color: #666; }

    .drop-zone p {
      color: #555;
      font-size: 0.55rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-align: center;
      line-height: 2.4;
    }

    .drop-zone .icon {
      font-size: 0.9rem;
      color: #333;
      letter-spacing: 0.6em;
    }

    #canvas {
      display: none;
      max-width: 100%;
      max-height: calc(100vh - 140px);
      box-shadow: 0 16px 64px rgba(0,0,0,0.6);
      transition: transform 0.2s ease;
    }

    #btn-change-photo {
      display: none;
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(20,20,20,0.75);
      border: 1px solid #3a3a3a;
      color: #666;
      font-family: var(--font-sans);
      font-size: 0.48rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 5px 13px;
      cursor: pointer;
      backdrop-filter: blur(6px);
      transition: color 0.2s, border-color 0.2s;
    }
    #btn-change-photo:hover { color: #aaa; border-color: #555; }

    #before-badge {
      display: none;
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-size: 0.42rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 4px 10px;
      pointer-events: none;
    }

    /* ── Panel derecho ── */
    .panel {
      height: 100%;
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: scroll;
      background: var(--panel);
    }
    .panel::-webkit-scrollbar { width: 2px; }
    .panel::-webkit-scrollbar-thumb { background: #ccc; }

    /* ── Pilares (Los 4 Laboratorios) ── */
    .pillar { border-bottom: 1px solid var(--border); }

    .pillar-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      cursor: pointer;
      user-select: none;
    }
    .pillar-header:hover { background: rgba(0,0,0,0.02); }

    .pillar-icon {
      width: 22px;
      height: 22px;
      color: var(--muted);
      flex-shrink: 0;
    }
    .pillar-icon svg { width: 100%; height: 100%; }

    .pillar-title {
      font-size: 0.52rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--text);
      flex: 1;
    }

    .pillar-toggle {
      font-size: 0.5rem;
      color: var(--muted);
      transition: transform 0.2s;
    }
    .pillar.collapsed .pillar-toggle { transform: rotate(-90deg); }

    .pillar-body {
      padding: 4px 18px 18px;
      overflow: hidden;
    }
    .pillar.collapsed .pillar-body { display: none; }

    /* ── Controles ── */
    .control { margin-bottom: 14px; }
    .control:last-child { margin-bottom: 0; }

    .control label {
      display: flex;
      justify-content: space-between;
      font-size: 0.52rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 8px;
    }

    .control label span {
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      font-weight: 400;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 1px;
      background: #d8d5d0;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      transition: transform 0.15s;
    }
    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.3); }

    /* ── Anotación ── */
    .annotation-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .annotation-label {
      font-size: 0.52rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text);
      flex: 1;
    }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 28px; height: 15px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: #d0cdc8;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle input:checked + .toggle-track { background: var(--accent); }
    .toggle-track::after {
      content: '';
      position: absolute;
      width: 11px; height: 11px;
      top: 2px; left: 2px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .toggle-track::after { transform: translateX(13px); }

    .annotation-input {
      display: none;
      width: 100%;
      margin-top: 8px;
      font-family: var(--font-sans);
      font-size: 0.52rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: none;
      border-bottom: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      padding: 4px 0;
      outline: none;
    }
    .annotation-input:focus { border-bottom-color: var(--accent); }
    .annotation-input.visible { display: block; }

    /* ── Reset ── */
    .panel-footer {
      padding: 16px 18px;
      margin-top: auto;
    }

    .btn-secondary {
      width: 100%;
      padding: 9px;
      font-family: var(--font-sans);
      font-size: 0.5rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      transition: opacity 0.2s;
    }
    .btn-secondary:hover { opacity: 0.6; }

    /* ── Footer / Export bar ── */
    footer {
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      padding: 9px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg);
    }

    .footer-info {
      font-size: 0.45rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }

    #btn-export {
      background: var(--accent);
      color: #fff;
      border: none;
      font-family: var(--font-sans);
      font-size: 0.5rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 10px 20px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    #btn-export:hover { opacity: 0.82; }

    #file-input { display: none; }

    /* ── Recorte ── */
    .crop-header {
      font-size: 0.52rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text);
      margin: 14px 0 10px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .crop-formats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
    }

    .btn-crop {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 6px 3px;
      background: #fff;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .btn-crop:hover { border-color: #aaa; }
    .btn-crop.active { border-color: var(--accent); }
    .btn-crop.active .crop-shape { stroke: var(--accent); }
    .btn-crop.active .crop-name { color: var(--accent); }

    .crop-shape { width: 22px; height: 22px; display: block; }
    .crop-name {
      font-size: 0.38rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      line-height: 1.3;
      text-align: center;
    }

    .crop-custom-inputs {
      display: none;
      gap: 6px;
      margin-top: 8px;
      align-items: center;
    }
    .crop-custom-inputs.visible { display: flex; }
    .crop-custom-inputs input[type="number"] {
      width: 48px;
      border: none;
      border-bottom: 1px solid var(--border);
      background: transparent;
      font-family: var(--font-sans);
      font-size: 0.52rem;
      letter-spacing: 0.1em;
      text-align: center;
      color: var(--text);
      outline: none;
      padding: 3px 0;
    }
    .crop-custom-inputs span {
      font-size: 0.52rem;
      color: var(--muted);
    }

    /* Overlay de recorte sobre el canvas */
    #crop-overlay-canvas {
      position: absolute;
      pointer-events: none;
      display: none;
    }

    /* ── Mobile nav (oculto en desktop) ── */
    .mobile-nav { display: none; }

    /* ── Mobile ── */
    @media (max-width: 700px) {

      /* Footer oculto en móvil */
      footer { display: none; }

      /* Workspace: solo canvas, sin panel */
      .workspace {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr;
        overflow: hidden;
      }

      /* Panel oculto: se convierte en bottom sheet */
      .panel {
        display: block;
        position: fixed;
        bottom: 58px; left: 0; right: 0;
        max-height: 60vh;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        border-left: none;
        border-top: 1px solid var(--border);
        border-radius: 14px 14px 0 0;
        transform: translateY(105%);
        transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
        z-index: 100;
        box-shadow: 0 -4px 24px rgba(0,0,0,0.12);
      }
      .panel.sheet-open { transform: translateY(0); }

      /* Canvas area: ocupa todo el espacio disponible */
      .canvas-area {
        padding: 10px;
        height: 100%;
        touch-action: none;
      }
      #canvas { max-height: calc(100dvh - 160px); }

      /* Tab bar en móvil */
      .tab-bar { padding: 0 12px; }
      .tab-btn { padding: 9px 12px; font-size: 0.55rem; }

      /* Nav inferior */
      .mobile-nav {
        display: flex;
        position: fixed;
        bottom: 0; left: 0; right: 0;
        height: 58px;
        background: var(--bg);
        border-top: 1px solid var(--border);
        z-index: 200;
      }

      .mobile-nav-btn {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 3px;
        background: none;
        border: none;
        cursor: pointer;
        font-family: var(--font-sans);
        font-size: 0.38rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--muted);
        padding: 8px 2px 6px;
        transition: color 0.2s;
      }
      .mobile-nav-btn svg { width: 20px; height: 20px; }
      .mobile-nav-btn.active { color: var(--accent); }

      .mobile-nav-export {
        background: var(--accent);
        color: #fff !important;
      }
      .mobile-nav-export:active { opacity: 0.8; }

    }
  </style>
</head>
<body>

<header>
  <h1>The Noir Studio</h1>
  <span class="tagline">Editor de Fotografía</span>
  <div class="header-actions">
    <button id="btn-lock" title="Bloquear configuración al cambiar foto">
      <svg id="lock-icon-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="1"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/>
      </svg>
      <svg id="lock-icon-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:none">
        <rect x="3" y="11" width="18" height="11" rx="1"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </button>
  </div>
</header>

<!-- La Curaduría: grupos de presets -->
<div class="presets-bar-wrapper">
  <div class="tab-bar" id="tab-bar"></div>
  <div class="tab-drawer" id="tab-drawer">
    <!-- grupos de presets generados por JS -->
  </div>
</div>

<div class="workspace">

  <!-- La Obra -->
  <div class="canvas-area" id="canvas-area">
    <div class="drop-zone" id="drop-zone">
      <div class="icon">◇ ◇ ◇</div>
      <p>Arrastra tu foto aquí<br>o haz clic para seleccionar<br>JPG · PNG · WEBP</p>
    </div>
    <canvas id="canvas"></canvas>
    <canvas id="crop-overlay-canvas"></canvas>
    <div id="before-badge">Antes</div>
    <button id="btn-change-photo">↺ Cambiar foto</button>
  </div>

  <!-- El Laboratorio -->
  <div class="panel">

    <!-- A. Geometría y Recorte -->
    <div class="pillar collapsed" id="pillar-geo">
      <div class="pillar-header" onclick="togglePillar('pillar-geo')">
        <span class="pillar-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 21 L3 3 L21 3"/><path d="M3 3 L21 21"/>
          </svg>
        </span>
        <span class="pillar-title">Geometría y Recorte</span>
        <span class="pillar-toggle">▾</span>
      </div>
      <div class="pillar-body">

        <div class="control">
          <label>Marco blanco <span id="val-borderSize">0</span></label>
          <input type="range" id="borderSize" min="0" max="120" value="0">

// ── Construir formatos de recorte ──
const cropFormatsEl = document.getElementById('crop-formats');
CROP_FORMATS.forEach(fmt => {
  const [rx, ry, rw, rh] = fmt.svgRect;
  const btn = document.createElement('button');
  btn.className = 'btn-crop' + (fmt.id === 'free' ? ' active' : '');
  btn.dataset.id = fmt.id;
  btn.innerHTML = `
    <svg class="crop-shape" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.4" stroke-linecap="round">
      <rect x="${rx}" y="${ry}" width="${rw}" height="${rh}"/>
    </svg>
    <span class="crop-name">${fmt.label}<br><span style="opacity:.6">${fmt.sub}</span></span>
  `;
  btn.addEventListener('click', () => setCropFormat(fmt.id, btn));
  cropFormatsEl.appendChild(btn);
});

function setCropFormat(id, btn) {
  activeCropFormat = id;
  cropFormatsEl.querySelectorAll('.btn-crop').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const isCustom = id === 'custom';
  document.getElementById('crop-custom-inputs').classList.toggle('visible', isCustom);
  updateCropOverlay();
}

document.getElementById('crop-custom-w').addEventListener('input', updateCropOverlay);
document.getElementById('crop-custom-h').addEventListener('input', updateCropOverlay);

// ── Overlay de recorte ──
const overlayCanvas = document.getElementById('crop-overlay-canvas');
const overlayCtx    = overlayCanvas.getContext('2d');

function updateCropOverlay() {
  if (!originalImage) { overlayCanvas.style.display = 'none'; return; }

  const fmt = CROP_FORMATS.find(f => f.id === activeCropFormat);
  if (!fmt || (!fmt.ratio && fmt.id !== 'custom')) {
    overlayCanvas.style.display = 'none'; return;
  }

  let ratio = fmt.ratio;
  if (fmt.id === 'custom') {
    const cw = parseFloat(document.getElementById('crop-custom-w').value) || 4;
    const ch = parseFloat(document.getElementById('crop-custom-h').value) || 5;
    ratio = cw / ch;
  }

  const canvasRect = canvas.getBoundingClientRect();
  const areaRect   = document.getElementById('canvas-area').getBoundingClientRect();

  overlayCanvas.width  = canvasRect.width;
  overlayCanvas.height = canvasRect.height;
  overlayCanvas.style.width  = canvasRect.width  + 'px';
  overlayCanvas.style.height = canvasRect.height + 'px';
  overlayCanvas.style.left   = (canvasRect.left - areaRect.left) + 'px';
  overlayCanvas.style.top    = (canvasRect.top  - areaRect.top)  + 'px';
  overlayCanvas.style.display = 'block';

  const w = canvasRect.width, h = canvasRect.height;
  const canvasRatio = w / h;
  let cropW, cropH;
  if (canvasRatio > ratio) { cropH = h; cropW = h * ratio; }
  else                     { cropW = w; cropH = w / ratio; }
  const cropX = (w - cropW) / 2;
  const cropY = (h - cropH) / 2;

  overlayCtx.clearRect(0, 0, w, h);
  // oscurecer fuera
  overlayCtx.fillStyle = 'rgba(0,0,0,0.55)';
  overlayCtx.fillRect(0, 0, w, h);
  // limpiar dentro
  overlayCtx.clearRect(cropX, cropY, cropW, cropH);
  // borde blanco
  overlayCtx.strokeStyle = 'rgba(255,255,255,0.85)';
  overlayCtx.lineWidth = 1;
  overlayCtx.strokeRect(cropX, cropY, cropW, cropH);
  // tercios
  overlayCtx.strokeStyle = 'rgba(255,255,255,0.22)';
  overlayCtx.lineWidth = 0.5;
  overlayCtx.beginPath();
  for (let i = 1; i < 3; i++) {
    overlayCtx.moveTo(cropX + cropW * i/3, cropY);
    overlayCtx.lineTo(cropX + cropW * i/3, cropY + cropH);
    overlayCtx.moveTo(cropX, cropY + cropH * i/3);
    overlayCtx.lineTo(cropX + cropW, cropY + cropH * i/3);
  }
  overlayCtx.stroke();
}

    btn.dataset.key = key;
    btn.innerHTML = `
      <span class="preset-icon">${PRESET_ICONS[key] || ''}</span>
      <span class="preset-label">${preset.label}</span>
    `;
    btn.addEventListener('click', () => applyPreset(key, btn));
    container.appendChild(btn);
  });
});

// ── Scroll hints para indicar que hay más contenido ──
const hintedGroups = new Set();

function attachScrollFade(el) {
  if (!el) return;
  function update() {
    const atEnd = el.scrollLeft + el.clientWidth >= el.scrollWidth - 4;
    el.classList.toggle('scrolled-end', atEnd);
  }
  el.addEventListener('scroll', update, { passive: true });
  update();
}

function hintScroll(container) {
  if (!container || container.scrollWidth <= container.clientWidth + 4) return;
  if (hintedGroups.has(container.id)) return;
  hintedGroups.add(container.id);
  // Pequeño bounce para indicar que hay más contenido a la derecha
  setTimeout(() => {
    container.scrollTo({ left: 72, behavior: 'smooth' });
    setTimeout(() => container.scrollTo({ left: 0, behavior: 'smooth' }), 420);
  }, 180);
}

function toggleTab(key, clickedTab) {
  const isSame = activeTab === key;

  // Desactivar todos los tabs y ocultar drawers
  tabBar.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.drawer-presets').forEach(el => el.classList.remove('visible'));

  if (isSame) {
    activeTab = null;
    tabDrawer.classList.remove('open');
    return;
  }

  activeTab = key;
  clickedTab.classList.add('active');
  const drawer = document.getElementById('drawer-group-' + key);
  drawer?.classList.add('visible');
  tabDrawer.classList.add('open');

  // Hint de scroll al abrir el drawer
  if (drawer) {
    attachScrollFade(drawer);
    hintScroll(drawer);
  }
}

// Fade en tab-bar al cargar
attachScrollFade(tabBar);

// ── Aplicar preset ──
function applyPreset(key, btn) {
  if (activePreset === key) {
    resetSliders();
    return;
  }
  activePreset = key;

  // Desactiva todos
  document.querySelectorAll('.btn-preset').forEach(b => {
    b.classList.remove('active');
    b.style.borderBottomColor = 'transparent';
    b.querySelector('.preset-icon').style.color  = '';
    b.querySelector('.preset-label').style.color = '';
  });

  // Activa este con su color
  btn.classList.add('active');
  const color = PRESETS[key].color;
  btn.style.borderBottomColor = color;
  btn.querySelector('.preset-icon').style.color  = color;
  btn.querySelector('.preset-label').style.color = color;

  // Aplica valores
  const p = PRESETS[key];
  Object.keys(sliders).forEach(k => {
    if (p[k] !== undefined) {
      sliders[k].value = p[k];
      if (vals[k]) vals[k].textContent = p[k];
    }
  });

  // Actualiza texto de anotación con nombre del preset si está vacío
  const annotInput = document.getElementById('annotation-text');
  if (!annotInput.value) annotInput.placeholder = PRESETS[key].label.toUpperCase() + ' / SEVILLA 2026';

  applyFilters();
}

// ── Carga de imagen ──
dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => {
  if (e.target.files[0]) loadImage(e.target.files[0]);
});
dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('drag-over');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadImage(file);
});

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      originalImage = img;
      dropZone.style.display = 'none';
      canvas.style.display = 'block';
      document.getElementById('btn-change-photo').style.display = 'block';

      // Si Lock ON, re-aplica el preset activo a la nueva foto
      if (lockOn && activePreset) {
        const btn = document.querySelector(`.btn-preset[data-key="${activePreset}"]`);
        applyPreset(activePreset, btn);
      } else {
        applyFilters();
      }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ── Cambiar foto ──
document.getElementById('btn-change-photo').addEventListener('click', () => {
  originalImage = null;
  if (!lockOn) {
    activePreset = null;
    resetSliders();
  }
  canvas.style.display = 'none';
  document.getElementById('btn-change-photo').style.display = 'none';
  document.getElementById('before-badge').style.display = 'none';
  canvas.style.transform = '';
  dropZone.style.display = '';
  if (!lockOn) {
    document.querySelectorAll('.btn-preset').forEach(b => {
      b.classList.remove('active');
      b.style.color = '';
      b.style.borderBottomColor = 'transparent';
    });
  }
  fileInput.value = '';
});

// ── Nivelar: CSS transform en preview ──
nivelarSlider.addEventListener('input', () => {
  const deg = parseFloat(nivelarSlider.value);
  document.getElementById('val-nivelar').textContent = deg + '°';
  canvas.style.transform = deg !== 0 ? `rotate(${deg}deg)` : '';
});

// ── Sharpness: solo afecta al export (muestra valor en UI) ──
sharpnessSlider.addEventListener('input', () => {
  document.getElementById('val-sharpness').textContent = sharpnessSlider.value;
});

// ── Motor de píxeles ──
function processPixels(data, p) {
  const contrastFactor = (259 * (p.contrast + 255)) / (255 * (259 - p.contrast));
  const satFactor      = (p.saturation + 100) / 100;
  const w              = p.warmth / 100;
  const lift           = p.liftBlacks * 0.65;

  for (let i = 0; i < data.length; i += 4) {
    let r = data[i], g = data[i+1], b = data[i+2];
    const lum = 0.299 * r + 0.587 * g + 0.114 * b;

    // Saturación
    r = lum + (r - lum) * satFactor;
    g = lum + (g - lum) * satFactor;
    b = lum + (b - lum) * satFactor;

    // Tinte en sombras
    if (p.shadowTint !== 0 && lum < 140) {
      const t = (p.shadowTint / 100) * (1 - lum / 140) * 20;
      g += t; r -= t * 0.25; b -= t * 0.15;
    }

    // Temperatura
    r += w * 28; g += w * 8; b -= w * 22;

    // Sombras
    if (p.shadows !== 0 && lum < 128) {
      const boost = (p.shadows / 100) * (1 - lum / 128) * 55;
      r += boost; g += boost; b += boost;
    }

    // Brillo
    r += p.brightness; g += p.brightness; b += p.brightness;

    // Contraste
    r = contrastFactor * (r - 128) + 128;
    g = contrastFactor * (g - 128) + 128;
    b = contrastFactor * (b - 128) + 128;

    // Recuperar luces
    if (p.highlightRecovery > 0 && lum > 190) {
      const pull = ((lum - 190) / 65) * (p.highlightRecovery / 100) * 40;
      r -= pull; g -= pull; b -= pull;
    }

    // Lift blacks (matte)
    if (lift > 0) {
      r = (r / 255) * (255 - lift) + lift;
      g = (g / 255) * (255 - lift) + lift;
      b = (b / 255) * (255 - lift) + lift;
    }

    // Grano
    if (p.grain > 0) {
      const noise = (Math.random() - 0.5) * p.grain * 0.85;
      r += noise; g += noise; b += noise;
    }

    data[i]   = Math.min(255, Math.max(0, r));
    data[i+1] = Math.min(255, Math.max(0, g));
    data[i+2] = Math.min(255, Math.max(0, b));
  }
}

function applyVignette(c, w, h, vignette) {
  if (vignette <= 0) return;
  const cx = w / 2, cy = h / 2;
  const grad = c.createRadialGradient(cx, cy, h * 0.22, cx, cy, h * 0.82);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, `rgba(0,0,0,${(vignette / 100) * 0.88})`);
  c.fillStyle = grad;
  c.fillRect(0, 0, w, h);
}

function applyFilters() {
  if (!originalImage) return;

  const border = parseInt(sliders.borderSize.value);
  const p = {};
  Object.keys(sliders).forEach(k => { p[k] = parseInt(sliders[k].value); });

  canvas.width  = originalImage.width  + border * 2;
  canvas.height = originalImage.height + border * 2;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(originalImage, border, border);

  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  processPixels(imageData.data, p);
  ctx.putImageData(imageData, 0, 0);
  applyVignette(ctx, canvas.width, canvas.height, p.vignette);
}

// ── Sliders: escuchar cambios ──
Object.entries(sliders).forEach(([key, slider]) => {
  slider.addEventListener('input', () => {
    if (vals[key]) vals[key].textContent = slider.value;
    activePreset = null;
    document.querySelectorAll('.btn-preset').forEach(b => {
      b.classList.remove('active');
      b.style.color = '';
      b.style.borderBottomColor = 'transparent';
    });
    applyFilters();
  });
});

// ── Exportar ──
document.getElementById('btn-export').addEventListener('click', () => {
  if (!originalImage) return;

  const btn = document.getElementById('btn-export');
  btn.textContent = 'Procesando...';
  btn.style.opacity = '0.6';

  setTimeout(() => {
    const exp    = document.createElement('canvas');
    const expCtx = exp.getContext('2d');

    // Calcular tamaño y recorte
    const fmt = CROP_FORMATS.find(f => f.id === activeCropFormat);
    let ratio = fmt ? fmt.ratio : null;
    if (activeCropFormat === 'custom') {
      const cw = parseFloat(document.getElementById('crop-custom-w').value) || 4;
      const ch = parseFloat(document.getElementById('crop-custom-h').value) || 5;
      ratio = cw / ch;
    }

    let srcX = 0, srcY = 0, srcW = canvas.width, srcH = canvas.height;
    let expW = fmt?.exportW || 1080;
    let expH = fmt?.exportH || 1350;

    if (ratio && ratio !== 'custom') {
      const canvasRatio = canvas.width / canvas.height;
      if (canvasRatio > ratio) { srcH = canvas.height; srcW = srcH * ratio; }
      else                     { srcW = canvas.width;  srcH = srcW / ratio; }
      srcX = (canvas.width  - srcW) / 2;
      srcY = (canvas.height - srcH) / 2;
      if (activeCropFormat === 'custom') {
        expW = 1080; expH = Math.round(1080 / ratio);
      }
    }

    exp.width  = expW;
    exp.height = expH;

    // Aplicar rotación (nivelar) al exportar
    const deg = parseFloat(nivelarSlider.value);
    if (deg !== 0) {
      expCtx.save();
      expCtx.translate(expW / 2, expH / 2);
      expCtx.rotate(deg * Math.PI / 180);
      expCtx.drawImage(canvas, srcX, srcY, srcW, srcH, -expW / 2, -expH / 2, expW, expH);
      expCtx.restore();
    } else {
      expCtx.drawImage(canvas, srcX, srcY, srcW, srcH, 0, 0, expW, expH);
    }

    // Anotación en el borde blanco
    const annotToggle = document.getElementById('annotation-toggle');
    const annotInput  = document.getElementById('annotation-text');
    const border = parseInt(sliders.borderSize.value);
    if (annotToggle.checked && border > 0) {
      const text = annotInput.value || annotInput.placeholder;
      const scaledBorder = border * (1080 / (originalImage.width + border * 2));
      expCtx.font = `300 ${Math.max(18, scaledBorder * 0.28)}px 'Cormorant Garamond', Georgia, serif`;
      expCtx.fillStyle = '#999';
      expCtx.letterSpacing = '3px';
      expCtx.textAlign = 'center';
      expCtx.fillText(text.toUpperCase(), 540, 1350 - scaledBorder * 0.32);
    }

    // Nitidez al exportar
    const sharpAmount = parseInt(sharpnessSlider.value) / 100;
    if (sharpAmount > 0) {
      const imgData = expCtx.getImageData(0, 0, 1080, 1350);
      sharpenImageData(imgData, sharpAmount * 0.8);
      expCtx.putImageData(imgData, 0, 0);
    }

    const link    = document.createElement('a');
    link.download = 'noir-studio.jpg';
    link.href     = exp.toDataURL('image/jpeg', 0.93);
    link.click();

    btn.textContent = 'Generar 1080×1350';
    btn.style.opacity = '';
  }, 16);
});

// ── Sharpening (Laplacian unsharp mask) ──
function sharpenImageData(imageData, amount) {
  const w   = imageData.width;
  const h   = imageData.height;
  const src = new Uint8ClampedArray(imageData.data);
  const dst = imageData.data;

  for (let y = 1; y < h - 1; y++) {
    for (let x = 1; x < w - 1; x++) {
      const i = (y * w + x) * 4;
      for (let c = 0; c < 3; c++) {
        const center = src[i + c];
        const neighbors = src[((y - 1) * w + x) * 4 + c]
                        + src[((y + 1) * w + x) * 4 + c]
                        + src[(y * w + x - 1) * 4 + c]
                        + src[(y * w + x + 1) * 4 + c];
        dst[i + c] = Math.min(255, Math.max(0,
          Math.round(center + amount * (4 * center - neighbors))
        ));
      }
    }
  }
}

// ── Reset ──
function resetSliders() {
  Object.values(sliders).forEach(s => { s.value = s.defaultValue; });
  Object.keys(vals).forEach(k => { if (vals[k]) vals[k].textContent = sliders[k].defaultValue; });
  nivelarSlider.value = 0;
  document.getElementById('val-nivelar').textContent = '0°';
  canvas.style.transform = '';
  document.querySelectorAll('.btn-preset').forEach(b => {
    b.classList.remove('active');
    b.style.borderBottomColor = 'transparent';
    b.querySelector('.preset-icon').style.color  = '';
    b.querySelector('.preset-label').style.color = '';
  });
  activePreset = null;
  applyFilters();
}

document.getElementById('btn-reset').addEventListener('click', resetSliders);

// ── Candado ──
document.getElementById('btn-lock').addEventListener('click', () => {
  lockOn = !lockOn;
  const lockBtn = document.getElementById('btn-lock');
  lockBtn.classList.toggle('locked', lockOn);
  document.getElementById('lock-icon-open').style.display   = lockOn ? 'none' : 'block';
  document.getElementById('lock-icon-closed').style.display = lockOn ? 'block' : 'none';
  lockBtn.title = lockOn
    ? 'Configuración bloqueada — la próxima foto mantendrá el preset'
    : 'Bloquear configuración al cambiar foto';
});

// ── Anotación toggle ──
document.getElementById('annotation-toggle').addEventListener('change', (e) => {
  document.getElementById('annotation-text').classList.toggle('visible', e.target.checked);
});

// ── Pilares: colapsar/expandir ──
function togglePillar(id) {
  document.getElementById(id).classList.toggle('collapsed');
}

// ── Atajos de teclado ──
// A / Espacio: ver antes (mantener pulsado)
// V: toggle marco blanco
// B: aplica Zuloaga
// S: exportar
function showOriginal() {
  if (!originalImage || showBefore) return;
  showBefore = true;
  document.getElementById('before-badge').style.display = 'block';
  const border = parseInt(sliders.borderSize.value);
  canvas.width  = originalImage.width  + border * 2;
  canvas.height = originalImage.height + border * 2;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(originalImage, border, border);
}

function hideOriginal() {
  if (!showBefore) return;
  showBefore = false;
  document.getElementById('before-badge').style.display = 'none';
  applyFilters();
}

// Soporte: tecla + long press móvil
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;

  if ((e.key.toLowerCase() === 'a' || e.key === ' ') && !e.repeat) {
    if (e.key === ' ') e.preventDefault();
    showOriginal();
    return;
  }

  switch (e.key.toLowerCase()) {
    case 'v': {
      const cur  = parseInt(sliders.borderSize.value);
      const next = cur > 0 ? 0 : 60;
      sliders.borderSize.value = next;
      vals.borderSize.textContent = next;
      activePreset = null;
      document.querySelectorAll('.btn-preset').forEach(b => {
        b.classList.remove('active');
        b.style.color = '';
        b.style.borderBottomColor = 'transparent';
      });
      applyFilters();
      break;
    }
    case 'b': {
      const btn = document.querySelector('.btn-preset[data-key="zuloaga"]');
      if (btn) applyPreset('zuloaga', btn);
      break;
    }
    case 's': {
      document.getElementById('btn-export').click();
      break;
    }
  }
});

document.addEventListener('keyup', e => {
  if (e.key.toLowerCase() === 'a' || e.key === ' ') hideOriginal();
});

// Long press en canvas (móvil)
let longPressTimer = null;
canvas.addEventListener('touchstart', e => {
  longPressTimer = setTimeout(showOriginal, 350);
}, { passive: true });
canvas.addEventListener('touchend', () => {
  clearTimeout(longPressTimer);
  hideOriginal();
});
canvas.addEventListener('touchcancel', () => {
  clearTimeout(longPressTimer);
  hideOriginal();
});

// ── Nav móvil ──
let activeMobileSheet = null;

function toggleMobileSheet(pillarId, btn) {
  const panel = document.querySelector('.panel');
  const isSame = activeMobileSheet === pillarId;

  // Cerrar todo
  document.querySelectorAll('.mobile-nav-btn').forEach(b => b.classList.remove('active'));
  panel.classList.remove('sheet-open');

  if (isSame) {
    activeMobileSheet = null;
    return;
  }

  // Abrir sección correcta
  activeMobileSheet = pillarId;
  btn.classList.add('active');

  // Expandir solo el pillar correcto
  document.querySelectorAll('.pillar').forEach(p => p.classList.add('collapsed'));
  document.getElementById(pillarId).classList.remove('collapsed');

  panel.classList.add('sheet-open');
}

// Exportar desde móvil
document.getElementById('btn-export-mobile').addEventListener('click', () => {
  document.getElementById('btn-export').click();
});

// Cerrar sheet al tocar el canvas
document.getElementById('canvas-area').addEventListener('touchstart', () => {
  if (activeMobileSheet) {
    document.querySelector('.panel').classList.remove('sheet-open');
    document.querySelectorAll('.mobile-nav-btn').forEach(b => b.classList.remove('active'));
    activeMobileSheet = null;
  }
}, { passive: true });

// ── URL params para SEO ──
const params = new URLSearchParams(window.location.search);
const toolParam = params.get('tool');
const resolvedTool = toolParam === 'noir' ? 'dead-of-night' : toolParam;
if (resolvedTool && PRESETS[resolvedTool]) {
  const btn = document.querySelector(`.btn-preset[data-key="${resolvedTool}"]`);
  if (btn) applyPreset(resolvedTool, btn);
}
if (toolParam === 'border') {
  sliders.borderSize.value = '60';
  vals.borderSize.textContent = '60';
}
