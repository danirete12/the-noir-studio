<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Play Store Assets Generator — The Noir Studio</title>
<style>
  body { background: #111; color: #ccc; font-family: sans-serif; padding: 2rem; }
  h2 { color: #e8e2d8; margin: 2rem 0 0.5rem; }
  p { font-size: 0.85rem; color: #888; margin-bottom: 0.8rem; }
  button {
    background: #C8201A; color: #fff; border: none; padding: 10px 22px;
    font-size: 0.85rem; cursor: pointer; letter-spacing: 0.1em; text-transform: uppercase;
    margin-top: 0.5rem;
  }
  button:hover { opacity: 0.85; }
  canvas { display: block; margin-top: 1rem; border: 1px solid #333; }
</style>
</head>
<body>

<h2>1. Icono de app — 512×512 px</h2>
<p>Descarga y sube como icono en Play Console (PNG sin transparencia).</p>
<button onclick="downloadIcon()">Descargar icono 512×512</button>
<canvas id="c-icon" width="512" height="512"></canvas>

<h2>2. Feature Graphic — 1024×500 px</h2>
<p>Imagen de cabecera de la ficha en Play Store.</p>
<button onclick="downloadFeature()">Descargar feature graphic 1024×500</button>
<canvas id="c-feature" width="1024" height="500"></canvas>

<script>
// ── Icono 512×512 ──
(function() {
  const c = document.getElementById('c-icon');
  const ctx = c.getContext('2d');
  const W = 512, H = 512;

  // Fondo
  ctx.fillStyle = '#0f0f0d';
  ctx.fillRect(0, 0, W, H);

  // Diamante centrado
  const cx = W / 2, cy = H / 2;
  const scale = 3.8;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);
  ctx.strokeStyle = '#e8e2d8';
  ctx.lineWidth = 4 / scale;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // Rombo exterior
  ctx.beginPath();
  ctx.moveTo(0, -38);
  ctx.quadraticCurveTo(5, -43, 10, -38);
  ctx.lineTo(34, -5);
  ctx.quadraticCurveTo(39, 0, 34, 5);
  ctx.lineTo(10, 38);
  ctx.quadraticCurveTo(5, 43, 0, 38);
  ctx.lineTo(-34, 5);
  ctx.quadraticCurveTo(-39, 0, -34, -5);
  ctx.closePath();
  ctx.stroke();

  // Línea horizontal
  ctx.lineWidth = 1.5 / scale;
  ctx.beginPath();
  ctx.moveTo(-39, 0);
  ctx.lineTo(39, 0);
  ctx.stroke();

  // Línea base
  ctx.lineWidth = 1.2 / scale;
  ctx.beginPath();
  ctx.moveTo(-34, 48);
  ctx.lineTo(34, 48);
  ctx.stroke();

  ctx.restore();
})();

// ── Feature Graphic 1024×500 ──
(function() {
  const c = document.getElementById('c-feature');
  const ctx = c.getContext('2d');
  const W = 1024, H = 500;

  // Fondo degradado sutil
  const grad = ctx.createLinearGradient(0, 0, W, H);
  grad.addColorStop(0, '#0f0f0d');
  grad.addColorStop(1, '#1a1a17');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Grid sutil de fondo
  ctx.strokeStyle = 'rgba(232,226,216,0.04)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 60) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 60) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Diamante izquierda
  const dx = 180, dy = H / 2;
  const sc = 3.2;
  ctx.save();
  ctx.translate(dx, dy);
  ctx.scale(sc, sc);
  ctx.strokeStyle = '#e8e2d8';
  ctx.lineWidth = 4 / sc;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  ctx.beginPath();
  ctx.moveTo(0, -38);
  ctx.quadraticCurveTo(5, -43, 10, -38);
  ctx.lineTo(34, -5);
  ctx.quadraticCurveTo(39, 0, 34, 5);
  ctx.lineTo(10, 38);
  ctx.quadraticCurveTo(5, 43, 0, 38);
  ctx.lineTo(-34, 5);
  ctx.quadraticCurveTo(-39, 0, -34, -5);
  ctx.closePath();
  ctx.stroke();

  ctx.lineWidth = 1.5 / sc;
  ctx.beginPath(); ctx.moveTo(-39, 0); ctx.lineTo(39, 0); ctx.stroke();
  ctx.lineWidth = 1.2 / sc;
  ctx.beginPath(); ctx.moveTo(-34, 48); ctx.lineTo(34, 48); ctx.stroke();
  ctx.restore();

  // Línea separadora vertical
  ctx.strokeStyle = 'rgba(232,226,216,0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(320, 80);
  ctx.lineTo(320, H - 80);
  ctx.stroke();

  // Texto derecha
  ctx.fillStyle = '#e8e2d8';
  ctx.font = '300 72px "Georgia", serif';
  ctx.letterSpacing = '8px';
  ctx.fillText('The Noir.', 370, H / 2 - 20);

  ctx.fillStyle = '#c8c4be';
  ctx.font = 'italic 300 52px "Georgia", serif';
  ctx.fillText('Studio', 370, H / 2 + 48);

  // Tagline
  ctx.fillStyle = 'rgba(200,192,184,0.55)';
  ctx.font = '300 16px "Arial", sans-serif';
  ctx.letterSpacing = '4px';
  ctx.fillText('EDITOR DE FOTOGRAFÍA GRATIS', 372, H / 2 + 105);
})();

function downloadIcon() {
  const c = document.getElementById('c-icon');
  const a = document.createElement('a');
  a.download = 'noir-studio-icon-512.png';
  a.href = c.toDataURL('image/png');
  a.click();
}

function downloadFeature() {
  const c = document.getElementById('c-feature');
  const a = document.createElement('a');
  a.download = 'noir-studio-feature-graphic.png';
  a.href = c.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
