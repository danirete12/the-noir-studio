<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { margin: 0; background: #222; display: flex; flex-direction: column; align-items: center; padding: 40px; gap: 20px; font-family: sans-serif; color: white; }
    .previews { display: flex; gap: 24px; align-items: flex-end; }
    .preview { display: flex; flex-direction: column; align-items: center; gap: 8px; font-size: 11px; color: #aaa; letter-spacing: 0.08em; text-transform: uppercase; }
    button { padding: 14px 40px; background: #C8201A; color: white; border: none; cursor: pointer; font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="previews">
    <div class="preview"><canvas id="c192" width="192" height="192"></canvas>favicon-192.png (Google)</div>
    <div class="preview"><canvas id="c180" width="180" height="180"></canvas>apple-touch-icon.png (iOS)</div>
    <div class="preview"><canvas id="c32" width="32" height="32"></canvas>favicon-32.png</div>
  </div>
  <button onclick="downloadAll()">Descargar los 3 archivos</button>

  <script>
    function drawLogo(canvas) {
      const ctx = canvas.getContext('2d');
      const W = canvas.width, H = canvas.height;
      const s = W / 100;

      ctx.fillStyle = '#0f0f0d';
      ctx.fillRect(0, 0, W, H);

      ctx.strokeStyle = '#e8e2d8';
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      // Diamond
      ctx.beginPath();
      ctx.moveTo(45*s, 12*s);
      ctx.quadraticCurveTo(50*s, 7*s, 55*s, 12*s);
      ctx.lineTo(84*s, 45*s);
      ctx.quadraticCurveTo(89*s, 50*s, 84*s, 55*s);
      ctx.lineTo(55*s, 88*s);
      ctx.quadraticCurveTo(50*s, 93*s, 45*s, 88*s);
      ctx.lineTo(16*s, 55*s);
      ctx.quadraticCurveTo(11*s, 50*s, 16*s, 45*s);
      ctx.closePath();
      ctx.lineWidth = 4 * s;
      ctx.stroke();

      // Horizontal line
      ctx.beginPath();
      ctx.moveTo(11*s, 50*s);
      ctx.lineTo(89*s, 50*s);
      ctx.lineWidth = 1.5 * s;
      ctx.stroke();

      // Bottom line
      ctx.beginPath();
      ctx.moveTo(16*s, 98*s);
      ctx.lineTo(84*s, 98*s);
      ctx.lineWidth = 1.2 * s;
      ctx.stroke();
    }

    drawLogo(document.getElementById('c192'));
    drawLogo(document.getElementById('c180'));
    drawLogo(document.getElementById('c32'));

    function dl(canvas, filename) {
      const a = document.createElement('a');
      a.download = filename;
      a.href = canvas.toDataURL('image/png');
      a.click();
    }

    function downloadAll() {
      dl(document.getElementById('c192'), 'favicon-192.png');
      setTimeout(() => dl(document.getElementById('c180'), 'apple-touch-icon.png'), 300);
      setTimeout(() => dl(document.getElementById('c32'),  'favicon-32.png'), 600);
    }
  </script>
</body>
</html>
