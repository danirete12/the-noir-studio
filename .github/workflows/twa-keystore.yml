name: TWA — Generar keystore (ejecutar una sola vez)

on:
  workflow_dispatch:
    inputs:
      password:
        description: 'Contraseña del keystore (guárdala bien, la necesitarás siempre)'
        required: true
        type: string

jobs:
  generar-keystore:
    runs-on: ubuntu-latest
    steps:
      - name: Generar keystore
        run: |
          keytool -genkey -v \
            -keystore android.keystore \
            -alias noir-studio \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "${{ inputs.password }}" \
            -keypass "${{ inputs.password }}" \
            -dname "CN=The Noir Studio, OU=App, O=Daniel Rete, L=ES, ST=Spain, C=ES"

      - name: Huella SHA256 (cópiala para assetlinks.json)
        run: |
          echo "=== COPIA ESTE VALOR EN .well-known/assetlinks.json ==="
          keytool -list -v \
            -keystore android.keystore \
            -alias noir-studio \
            -storepass "${{ inputs.password }}" \
            | grep "SHA256:"

      - name: Exportar keystore en base64 (cópialo como secret ANDROID_KEYSTORE_B64)
        run: |
          echo "=== COPIA ESTE VALOR COMO SECRET ANDROID_KEYSTORE_B64 ==="
          base64 -w 0 android.keystore

      - name: Subir keystore como artefacto (descárgalo como backup)
        uses: actions/upload-artifact@v4
        with:
          name: android-keystore-backup
          path: android.keystore
          retention-days: 1
