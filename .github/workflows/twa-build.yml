name: TWA — Build AAB para Play Store

on:
  push:
    branches: [master]
    paths:
      - 'twa/twa-manifest.json'
      - 'manifest.json'
      - 'index.html'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Android SDK (cmdline-tools)
        uses: android-actions/setup-android@v3

      - name: Instalar bubblewrap y expect
        run: |
          npm install -g @bubblewrap/cli
          sudo apt-get install -y expect

      - name: Configurar bubblewrap para usar SDK/JDK del sistema
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_SDK_ROOT"
          }
          EOF

      - name: Restaurar keystore desde secret
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > twa/android.keystore

      - name: Inicializar proyecto Android
        working-directory: twa
        run: |
          expect << 'EXPECT_EOF'
          set timeout 120
          spawn bubblewrap init --manifest https://raw.githubusercontent.com/danirete12/the-noir-studio/master/manifest.json --skipPwaValidation
          expect "Domain:"
          send "thenoir.studio\r"
          expect {
            -re {[?]} { send "\r"; exp_continue }
            eof {}
            timeout {}
          }
          EXPECT_EOF
          git checkout twa-manifest.json
          ls -la

      - name: Actualizar proyecto y generar checksum
        working-directory: twa
        run: bubblewrap update --skipPwaValidation 2>/dev/null || true

      - name: Parchear build.gradle y AndroidManifest.xml
        working-directory: twa
        run: |
          python3 << 'PYEOF'
          import re

          # --- build.gradle ---
          with open('app/build.gradle', 'r') as f:
              c = f.read()
          print("build.gradle ANTES:", [l.strip() for l in c.splitlines() if any(x in l for x in ['applicationId','namespace','versionCode','versionName'])])
          c = re.sub(r'applicationId\s+"[^"]*"', 'applicationId "com.thenoirstudio.app"', c)
          if re.search(r'namespace\s+"[^"]*"', c):
              c = re.sub(r'namespace\s+"[^"]*"', 'namespace "com.thenoirstudio.app"', c)
          else:
              c = re.sub(r'(android\s*\{)', r'\1\n    namespace "com.thenoirstudio.app"', c, count=1)
          c = re.sub(r'versionCode\s+\d+', 'versionCode 3', c)
          c = re.sub(r'versionName\s+"[^"]*"', 'versionName "1.0.3"', c)
          with open('app/build.gradle', 'w') as f:
              f.write(c)
          print("build.gradle DESPUÉS:", [l.strip() for l in c.splitlines() if any(x in l for x in ['applicationId','namespace','versionCode','versionName'])])

          # --- AndroidManifest.xml ---
          # AGP 8.x: el namespace va en build.gradle; package="" en el manifest causa error de build
          manifest_path = 'app/src/main/AndroidManifest.xml'
          with open(manifest_path, 'r') as f:
              m = f.read()
          print("manifest ANTES (package attr):", re.findall(r'package="[^"]*"', m))
          m = re.sub(r'\s+package="[^"]*"', '', m)
          with open(manifest_path, 'w') as f:
              f.write(m)
          print("manifest DESPUÉS (package attr):", re.findall(r'package="[^"]*"', m))
          PYEOF

      - name: Compilar AAB
        working-directory: twa
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/android.keystore \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias=noir-studio \
            -Pandroid.injected.signing.key.password="$KEYSTORE_PASSWORD"

      - name: Subir AAB como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: noir-studio-${{ github.run_number }}.aab
          path: twa/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90
